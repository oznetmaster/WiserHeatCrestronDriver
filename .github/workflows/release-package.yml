name: Release Package

on:
  workflow_dispatch:
  release:
	types:
	  - published
  push:
	tags:
	  - 'v*'

permissions:
  contents: write

jobs:
  build-and-upload-package:
	runs-on: windows-latest
	env:
	  MANIFESTUTIL_VERSION: 27.0.24
	  OFFICE_CORE_VERSION: 12.0.0
	  WORD_INTEROP_VERSION: 15.0.4797.1004
	  NET472_REFERENCE_ASSEMBLIES: C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETFramework\v4.7.2
	  NETFX_RUNTIME_DIR: C:\Windows\Microsoft.NET\Framework64\v4.0.30319
	steps:
	  - name: Check out repository
		uses: actions/checkout@v4

	  - name: Set up .NET SDK
		uses: actions/setup-dotnet@v4
		with:
		  dotnet-version: 8.0.x

	  - name: Set up NuGet
		uses: NuGet/setup-nuget@v2

	  - name: Install ILRepack tool
		shell: pwsh
		run: |
		  dotnet tool install --global dotnet-ilrepack
		  "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

	  - name: Install ManifestUtil package
		shell: pwsh
		run: |
		  nuget install Crestron.DeviceDrivers.ManifestUtil -Version $env:MANIFESTUTIL_VERSION -OutputDirectory "$env:RUNNER_TEMP\nuget-tools"

	  - name: Install Word interop package
		shell: pwsh
		run: |
		  nuget install Microsoft.Office.Interop.Word -Version $env:WORD_INTEROP_VERSION -OutputDirectory "$env:RUNNER_TEMP\nuget-tools"

	  - name: Install Office core package
		shell: pwsh
		run: |
		  nuget install Microsoft.Office.Core -Version $env:OFFICE_CORE_VERSION -OutputDirectory "$env:RUNNER_TEMP\nuget-tools"

	  - name: Resolve ManifestUtil path
		id: manifestutil
		shell: pwsh
		run: |
		  $toolRoot = Join-Path $env:RUNNER_TEMP "nuget-tools\Crestron.DeviceDrivers.ManifestUtil.$env:MANIFESTUTIL_VERSION"
		  $manifestUtil = Get-ChildItem -Path $toolRoot -Filter ManifestUtil.exe -Recurse | Select-Object -First 1
		  if ($null -eq $manifestUtil) {
			throw "ManifestUtil.exe was not found under $toolRoot"
		  }

		  $wordInteropRoot = Join-Path $env:RUNNER_TEMP "nuget-tools\Microsoft.Office.Interop.Word.$env:WORD_INTEROP_VERSION"
		  $wordInterop = Get-ChildItem -Path $wordInteropRoot -Filter Microsoft.Office.Interop.Word.dll -Recurse | Select-Object -First 1
		  if ($null -eq $wordInterop) {
			throw "Microsoft.Office.Interop.Word.dll was not found under $wordInteropRoot"
		  }

		  $officeCoreRoot = Join-Path $env:RUNNER_TEMP "nuget-tools\Microsoft.Office.Core.$env:OFFICE_CORE_VERSION"
		  $officeCore = Get-ChildItem -Path $officeCoreRoot -Filter office.dll -Recurse | Select-Object -First 1
		  if ($null -eq $officeCore) {
			throw "office.dll was not found under $officeCoreRoot"
		  }

		  Copy-Item $wordInterop.FullName (Join-Path $manifestUtil.Directory.FullName 'Microsoft.Office.Interop.Word.dll') -Force
		  Copy-Item $officeCore.FullName (Join-Path $manifestUtil.Directory.FullName 'office.dll') -Force

		  $manifestUtilConfig = @'
		  <?xml version="1.0" encoding="utf-8"?>
		  <configuration>
			<runtime>
			  <assemblyBinding xmlns="urn:schemas-microsoft-com:asm.v1">
				<dependentAssembly>
				  <assemblyIdentity name="office" publicKeyToken="71e9bce111e9429c" culture="neutral" />
				  <bindingRedirect oldVersion="0.0.0.0-15.0.0.0" newVersion="12.0.0.0" />
				</dependentAssembly>
			  </assemblyBinding>
			</runtime>
		  </configuration>
		  '@
		  Set-Content -Path (Join-Path $manifestUtil.Directory.FullName 'ManifestUtil.exe.config') -Value $manifestUtilConfig -Encoding UTF8

		  "exe_path=$($manifestUtil.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

	  - name: Restore dependencies
		run: dotnet restore WiserHeatCrestronDriver/WiserHeatCrestronDriver.csproj

	  - name: Build release package
		shell: pwsh
		run: |
		  dotnet build WiserHeatCrestronDriver/WiserHeatCrestronDriver.csproj -c Release -p:ManifestUtilExe="${{ steps.manifestutil.outputs.exe_path }}" -p:LocalNet472ReferenceAssemblies="$env:NET472_REFERENCE_ASSEMBLIES" -p:LocalNetFxRuntimeDir="$env:NETFX_RUNTIME_DIR" -p:MergeDependenciesContinueOnError=false -p:PackageDriverContinueOnError=false -p:PackageDriverIgnoreExitCode=false

	  - name: Locate package
		id: package
		shell: pwsh
		run: |
		  $pkg = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\WiserHeatCrestronDriver\bin\Release" -Filter *.pkg -Recurse | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1
		  if ($null -eq $pkg) {
			throw 'No .pkg file was generated in WiserHeatCrestronDriver/bin/Release.'
		  }

		  "pkg_path=$($pkg.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

	  - name: Upload package asset
		uses: softprops/action-gh-release@v2
		with:
		  tag_name: ${{ github.event.release.tag_name || github.ref_name }}
		  files: ${{ steps.package.outputs.pkg_path }}
		  fail_on_unmatched_files: true
